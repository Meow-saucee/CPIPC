  <text x="612" y="588" class="small">NMS, union, expansion, clipping</text>
  <rect x="882" y="540" width="190" height="62" class="box out"/>
  <text x="902" y="567" class="text">results.json</text>
  <text x="902" y="588" class="small">predict_bboxes for 301 images</text>
