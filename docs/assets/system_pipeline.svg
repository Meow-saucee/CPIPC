  <path d="M822 387 C840 430 422 486 422 540" class="arrow"/>

  <text x="40" y="724" class="small">Key editable files: configs/yolo_seg_crack_hybrid.yaml, src/train_yolo_seg.py, src/infer_submit_seg.py, src/eval_submission.py</text>
