<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 16px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .data { fill: #ecfeff; stroke: #0891b2; }
      .train { fill: #f0fdf4; stroke: #16a34a; }
      .infer { fill: #fff7ed; stroke: #ea580c; }
      .out { fill: #fef2f2; stroke: #dc2626; }
      .text { font: 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 12; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#f8fafc"/>
  <text x="40" y="54" class="title">Cross-scale Chip Crack Detection System</text>
  <text x="40" y="82" class="subtitle">YOLO-seg training, mask/bbox fusion, bbox JSON submission</text>

  <rect x="32" y="120" width="1216" height="150" class="lane"/>
