  <text x="82" y="383" class="text">train_yolo_seg.py</text>
  <text x="82" y="404" class="small">config: yolo_seg_crack_hybrid.yaml</text>
  <rect x="382" y="356" width="240" height="62" class="box train"/>
  <text x="402" y="383" class="text">YOLO-seg model</text>
  <text x="402" y="404" class="small">Backbone + FPN/PAN + Detect/Seg heads</text>
  <rect x="712" y="356" width="220" height="62" class="box train"/>
  <text x="732" y="383" class="text">runs/crack_yolo_seg</text>
  <text x="732" y="404" class="small">best.pt, last.pt, results.csv</text>
  <rect x="1012" y="356" width="180" height="62" class="box train"/>
  <text x="1032" y="383" class="text">TensorBoard</text>
  <text x="1032" y="404" class="small">loss, P/R, mAP curves</text>
