  <path d="M622 387 L712 387" class="arrow"/>
  <path d="M932 387 L1012 387" class="arrow"/>
  <path d="M772 238 C772 280 177 300 177 356" class="arrow"/>

  <rect x="32" y="480" width="1216" height="205" class="lane"/>
  <text x="52" y="510" class="subtitle">Inference, post-processing, and submission</text>
