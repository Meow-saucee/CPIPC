  <rect x="62" y="176" width="210" height="62" class="box data"/>
  <text x="82" y="203" class="text">dataset/trainval</text>
  <text x="82" y="224" class="small">gray images + trainval.json</text>
  <rect x="352" y="176" width="230" height="62" class="box data"/>
  <text x="372" y="203" class="text">prepare_yolo_seg.py</text>
  <text x="372" y="224" class="small">bbox + segmentation to YOLO labels</text>
  <rect x="662" y="176" width="220" height="62" class="box data"/>
  <text x="682" y="203" class="text">data/yolo_seg</text>
  <text x="682" y="224" class="small">images/train, images/val, labels</text>
  <rect x="962" y="176" width="220" height="62" class="box data"/>
  <text x="982" y="203" class="text">data/crack_seg.yaml</text>
